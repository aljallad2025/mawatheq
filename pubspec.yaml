name: mawatheq
description: "mawatheq مواثيق - منصة قانونية بالذكاء الاصطناعي"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  shared_preferences: ^2.2.3
  file_picker: ^8.0.6
  image_picker: ^1.1.2

  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  table_calendar: ^3.1.2
  url_launcher: ^6.3.0
  percent_indicator: ^4.2.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/icon_square.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon_square.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/icon_square.png
  color_dark: "#0F1F33"
  image_dark: assets/images/icon_square.png
  android_12:
    image: assets/images/icon_square.png
    color: "#FFFFFF"
    color_dark: "#0F1F33"
  ios: false
  web: false
